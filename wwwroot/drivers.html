<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Management - Live Tracking Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #112240 50%, #1a365d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
        }

        .filters {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .filter-group select,
        .filter-group input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            min-width: 150px;
        }

        .drivers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .driver-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }

        .driver-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        .driver-card.status-active {
            border-left-color: #28a745;
        }

        .driver-card.status-inactive {
            border-left-color: #6c757d;
        }

        .driver-card.status-onleave {
            border-left-color: #ffc107;
        }

        .driver-card.status-suspended {
            border-left-color: #dc3545;
        }

        .driver-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .driver-name {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .driver-id {
            font-size: 12px;
            color: #666;
            background: #f8f9fa;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.active {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.inactive {
            background: #e2e3e5;
            color: #383d41;
        }

        .status-badge.onleave {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.suspended {
            background: #f8d7da;
            color: #721c24;
        }

        .driver-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 13px;
            color: #333;
            font-weight: 500;
        }

        .driver-stats {
            display: flex;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
        }

        .driver-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .driver-actions .btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: #333;
            font-size: 22px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 13px;
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        @media (max-width: 768px) {
            .drivers-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions .btn {
                flex: 1;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group select,
            .filter-group input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍✈️ Driver Management</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">← Back to Dashboard</button>
                <button class="btn btn-primary" onclick="openAddModal()">+ Add New Driver</button>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Region</label>
                <select id="regionFilter" onchange="filterDrivers()">
                    <option value="">All Regions</option>
                    <option value="South-Fleet">South Fleet (Karachi)</option>
                    <option value="North-Fleet">North Fleet (Lahore)</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="statusFilter" onchange="filterDrivers()">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                    <option value="OnLeave">On Leave</option>
                    <option value="Suspended">Suspended</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Search</label>
                <input type="text" id="searchFilter" placeholder="Search by name or ID..." onkeyup="filterDrivers()">
            </div>
        </div>

        <div class="drivers-grid" id="driversGrid">
            <!-- Driver cards will be dynamically generated -->
        </div>
    </div>

    <!-- Add/Edit Driver Modal -->
    <div class="modal" id="driverModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Driver</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="driverForm" onsubmit="saveDriver(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="driverName" required>
                    </div>
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="tel" id="driverPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="driverEmail">
                    </div>
                    <div class="form-group">
                        <label>License Number *</label>
                        <input type="text" id="licenseNumber" required>
                    </div>
                    <div class="form-group">
                        <label>License Expiry *</label>
                        <input type="date" id="licenseExpiry" required>
                    </div>
                    <div class="form-group">
                        <label>Region *</label>
                        <select id="driverRegion" required>
                            <option value="">Select Region</option>
                            <option value="South-Fleet">South Fleet (Karachi)</option>
                            <option value="North-Fleet">North Fleet (Lahore)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Assigned Vehicle</label>
                        <input type="text" id="assignedVehicle" placeholder="e.g., TRK-01">
                    </div>
                    <div class="form-group">
                        <label>Status *</label>
                        <select id="driverStatus" required>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                            <option value="OnLeave">On Leave</option>
                            <option value="Suspended">Suspended</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Address</label>
                        <input type="text" id="driverAddress">
                    </div>
                    <div class="form-group">
                        <label>Emergency Contact</label>
                        <input type="text" id="emergencyContact">
                    </div>
                    <div class="form-group">
                        <label>Emergency Phone</label>
                        <input type="tel" id="emergencyPhone">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-success">Save Driver</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Driver Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Driver Details</h2>
                <button class="close-btn" onclick="closeViewModal()">&times;</button>
            </div>
            <div id="viewDriverContent">
                <!-- Driver details will be displayed here -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeViewModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        let drivers = [];
        let editingDriverId = null;

        async function loadDrivers() {
            try {
                const response = await fetch('/api/drivers');
                drivers = await response.json();
                renderDrivers();
            } catch (error) {
                console.error('Error loading drivers:', error);
                alert('Failed to load drivers. Please try again.');
            }
        }

        function renderDrivers() {
            const grid = document.getElementById('driversGrid');
            const regionFilter = document.getElementById('regionFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const searchFilter = document.getElementById('searchFilter').value.toLowerCase();

            const filteredDrivers = drivers.filter(driver => {
                const matchRegion = !regionFilter || driver.region === regionFilter;
                const matchStatus = !statusFilter || driver.status === statusFilter;
                const matchSearch = !searchFilter || 
                    driver.name.toLowerCase().includes(searchFilter) ||
                    driver.id.toLowerCase().includes(searchFilter);
                return matchRegion && matchStatus && matchSearch;
            });

            grid.innerHTML = filteredDrivers.map(driver => `
                <div class="driver-card status-${driver.status.toLowerCase()}">
                    <div class="driver-header">
                        <div>
                            <div class="driver-name">${driver.name}</div>
                            <div class="driver-id">${driver.id}</div>
                        </div>
                        <span class="status-badge ${driver.status.toLowerCase()}">${formatStatus(driver.status)}</span>
                    </div>
                    <div class="driver-details">
                        <div class="detail-item">
                            <span class="detail-label">Phone</span>
                            <span class="detail-value">${driver.phone}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Email</span>
                            <span class="detail-value">${driver.email || '-'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">License</span>
                            <span class="detail-value">${driver.licenseNumber}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">License Expiry</span>
                            <span class="detail-value">${new Date(driver.licenseExpiry).toLocaleDateString()}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Vehicle</span>
                            <span class="detail-value">${driver.assignedVehicleId || 'Not Assigned'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Region</span>
                            <span class="detail-value">${driver.region}</span>
                        </div>
                    </div>
                    <div class="driver-stats">
                        <div class="stat-item">
                            <div class="stat-value">${driver.totalTrips}</div>
                            <div class="stat-label">Trips</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${driver.totalDistanceKm.toLocaleString()}</div>
                            <div class="stat-label">Km Driven</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${driver.lastTripDate ? new Date(driver.lastTripDate).toLocaleDateString() : '-'}</div>
                            <div class="stat-label">Last Trip</div>
                        </div>
                    </div>
                    <div class="driver-actions">
                        <button class="btn btn-primary btn-sm" onclick="viewDriver('${driver.id}')">View</button>
                        <button class="btn btn-success btn-sm" onclick="editDriver('${driver.id}')">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteDriver('${driver.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function formatStatus(status) {
            return status.replace(/([A-Z])/g, ' $1').trim();
        }

        function filterDrivers() {
            renderDrivers();
        }

        function openAddModal() {
            editingDriverId = null;
            document.getElementById('modalTitle').textContent = 'Add New Driver';
            document.getElementById('driverForm').reset();
            document.getElementById('driverModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('driverModal').classList.remove('active');
            editingDriverId = null;
        }

        async function saveDriver(event) {
            event.preventDefault();
            
            const driverData = {
                name: document.getElementById('driverName').value,
                phone: document.getElementById('driverPhone').value,
                email: document.getElementById('driverEmail').value,
                licenseNumber: document.getElementById('licenseNumber').value,
                licenseExpiry: document.getElementById('licenseExpiry').value,
                region: document.getElementById('driverRegion').value,
                assignedVehicleId: document.getElementById('assignedVehicle').value,
                status: document.getElementById('driverStatus').value,
                address: document.getElementById('driverAddress').value,
                emergencyContact: document.getElementById('emergencyContact').value,
                emergencyPhone: document.getElementById('emergencyPhone').value,
                hireDate: new Date().toISOString(),
                totalDistanceKm: 0,
                totalTrips: 0
            };

            try {
                let response;
                if (editingDriverId) {
                    response = await fetch(`/api/drivers/${editingDriverId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(driverData)
                    });
                } else {
                    response = await fetch('/api/drivers', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(driverData)
                    });
                }

                if (response.ok) {
                    closeModal();
                    loadDrivers();
                    alert(editingDriverId ? 'Driver updated successfully!' : 'Driver added successfully!');
                } else {
                    alert('Failed to save driver. Please try again.');
                }
            } catch (error) {
                console.error('Error saving driver:', error);
                alert('Failed to save driver. Please try again.');
            }
        }

        async function editDriver(id) {
            const driver = drivers.find(d => d.id === id);
            if (!driver) return;

            editingDriverId = id;
            document.getElementById('modalTitle').textContent = 'Edit Driver';
            document.getElementById('driverName').value = driver.name;
            document.getElementById('driverPhone').value = driver.phone;
            document.getElementById('driverEmail').value = driver.email || '';
            document.getElementById('licenseNumber').value = driver.licenseNumber;
            document.getElementById('licenseExpiry').value = driver.licenseExpiry.split('T')[0];
            document.getElementById('driverRegion').value = driver.region;
            document.getElementById('assignedVehicle').value = driver.assignedVehicleId || '';
            document.getElementById('driverStatus').value = driver.status;
            document.getElementById('driverAddress').value = driver.address || '';
            document.getElementById('emergencyContact').value = driver.emergencyContact || '';
            document.getElementById('emergencyPhone').value = driver.emergencyPhone || '';
            
            document.getElementById('driverModal').classList.add('active');
        }

        async function deleteDriver(id) {
            if (!confirm('Are you sure you want to delete this driver?')) return;

            try {
                const response = await fetch(`/api/drivers/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadDrivers();
                    alert('Driver deleted successfully!');
                } else {
                    alert('Failed to delete driver. Please try again.');
                }
            } catch (error) {
                console.error('Error deleting driver:', error);
                alert('Failed to delete driver. Please try again.');
            }
        }

        function viewDriver(id) {
            const driver = drivers.find(d => d.id === id);
            if (!driver) return;

            document.getElementById('viewDriverContent').innerHTML = `
                <div class="form-grid">
                    <div class="detail-item">
                        <span class="detail-label">Driver ID</span>
                        <span class="detail-value">${driver.id}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Name</span>
                        <span class="detail-value">${driver.name}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Phone</span>
                        <span class="detail-value">${driver.phone}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Email</span>
                        <span class="detail-value">${driver.email || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">License Number</span>
                        <span class="detail-value">${driver.licenseNumber}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">License Expiry</span>
                        <span class="detail-value">${new Date(driver.licenseExpiry).toLocaleDateString()}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Region</span>
                        <span class="detail-value">${driver.region}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Assigned Vehicle</span>
                        <span class="detail-value">${driver.assignedVehicleId || 'Not Assigned'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Status</span>
                        <span class="detail-value">${formatStatus(driver.status)}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Hire Date</span>
                        <span class="detail-value">${new Date(driver.hireDate).toLocaleDateString()}</span>
                    </div>
                    <div class="detail-item full-width">
                        <span class="detail-label">Address</span>
                        <span class="detail-value">${driver.address || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Emergency Contact</span>
                        <span class="detail-value">${driver.emergencyContact || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Emergency Phone</span>
                        <span class="detail-value">${driver.emergencyPhone || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Total Trips</span>
                        <span class="detail-value">${driver.totalTrips}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Total Distance</span>
                        <span class="detail-value">${driver.totalDistanceKm.toLocaleString()} km</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Last Trip Date</span>
                        <span class="detail-value">${driver.lastTripDate ? new Date(driver.lastTripDate).toLocaleDateString() : '-'}</span>
                    </div>
                </div>
            `;
            document.getElementById('viewModal').classList.add('active');
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }

        // Load drivers on page load
        document.addEventListener('DOMContentLoaded', loadDrivers);
    </script>
</body>
</html>
